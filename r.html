<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>六稜殺人事件</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    padding:20px;
    font-family:'Noto Serif JP',serif;
    background:#f7f5f0;
    color:#222;
    text-align:center;
}

h1{
    color:#8b0000;
    font-size:3rem;
    margin-bottom:5px;
}

.subtitle{
    font-size:1.2rem;
    margin-bottom:40px;
}

.card{
    max-width:700px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.now{
    font-size:2rem;
    font-weight:bold;
    color:#8b0000;
}

.group{
    font-size:4rem;
    margin:20px 0;
    font-weight:bold;
}

.next{
    font-size:1.5rem;
    margin-top:20px;
}

.countdown{
    font-size:2rem;
    margin-top:20px;
}

.time{
    margin-top:15px;
    color:#666;
}
</style>
</head>

<body>

<h1>六稜殺人事件</h1>
<div class="subtitle">北野高校 1-1</div>

<div class="card">

<div class="now" id="status">読み込み中...</div>

<div class="group" id="group"></div>

<div class="countdown" id="countdown"></div>

<div class="next" id="next"></div>

<div class="time" id="clock"></div>

</div>

<script>

const schedule = [
["09:30","09:45","A"],
["09:45","10:00","B"],
["10:00","10:15","C"],
["10:15","10:30","D"],
["10:30","10:45","E"],
["10:45","11:00","F"],
["11:00","11:15","G"],
["11:15","11:30","H"],
["11:30","11:45","I"],
["11:45","12:00","J"],
["12:00","12:15","K"],
["12:15","12:30","L"],

["12:30","13:00","LUNCH"],

["13:00","13:15","M"],
["13:15","13:30","N"],
["13:30","13:45","Ø"],
["13:45","14:00","P"],
["14:00","14:15","Q"],
["14:15","14:30","R"],
["14:30","14:45","S"],
["14:45","15:00","T"],
["15:00","15:15","U"],
["15:15","15:30","V"]
];

function toMinutes(str){
    const [h,m] = str.split(":").map(Number);
    return h*60+m;
}

function update(){

    const now = new Date();

    const currentMinutes =
        now.getHours()*60 + now.getMinutes();

    document.getElementById("clock").innerText =
        now.toLocaleTimeString("ja-JP");

    let found = false;

    for(let i=0;i<schedule.length;i++){

        const start = toMinutes(schedule[i][0]);
        const end = toMinutes(schedule[i][1]);

        if(currentMinutes >= start &&
           currentMinutes < end){

            found = true;

            const remain =
                end-currentMinutes-1;

            if(schedule[i][2] === "LUNCH"){

                document.getElementById("status").innerText =
                    "昼休憩中";

                document.getElementById("group").innerText =
                    "🍱";

                document.getElementById("countdown").innerText =
                    `あと${remain+1}分`;

                document.getElementById("next").innerText =
                    "次は M01～M06";

            }else{

                document.getElementById("status").innerText =
                    "現在公演中";

                document.getElementById("group").innerText =
                    `${schedule[i][2]}01～${schedule[i][2]}06`;

                document.getElementById("countdown").innerText =
                    `あと${remain+1}分`;

                if(i+1 < schedule.length){

                    if(schedule[i+1][2] === "LUNCH"){
                        document.getElementById("next").innerText =
                            "次は昼休憩";
                    }else{
                        document.getElementById("next").innerText =
                            `次は ${schedule[i+1][2]}01～${schedule[i+1][2]}06`;
                    }

                }

            }

            break;
        }
    }

    if(!found){

        document.getElementById("status").innerText =
            "現在公演は行っていません";

        document.getElementById("group").innerText = "";

        document.getElementById("countdown").innerText = "";

        document.getElementById("next").innerText = "";
    }
}

update();
setInterval(update,1000);

</script>

</body>
</html>
